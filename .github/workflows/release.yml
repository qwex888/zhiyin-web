name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '重新发布的 tag（如 v0.6.1）'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.tag.outputs.ref }}

      - name: Enable pnpm via corepack
        run: corepack enable pnpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Archive build output
        run: tar -czf dist.tar.gz dist

      - name: Generate release notes
        run: |
          TAG="${{ steps.tag.outputs.ref }}"
          VERSION="${TAG#v}"
          chmod +x scripts/generate-release-data.sh

          if [ -f release_notes.md ]; then
            echo "使用 tag 中的 release_notes.md"
          else
            ./scripts/generate-release-data.sh "$VERSION"
          fi

          if [ ! -f release_notes.md ]; then
            echo "release_notes.md 不存在" >&2
            exit 1
          fi

      - name: Create or update Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.ref }}"

          # 本地 release.sh 可能已创建空 Release；此处幂等上传 dist.tar.gz
          if gh release view "$TAG" &>/dev/null; then
            echo "Release $TAG 已存在，上传/更新 dist.tar.gz..."
            gh release upload "$TAG" dist.tar.gz --clobber
            gh release edit "$TAG" --title "Release $TAG" --notes-file release_notes.md
          else
            gh release create "$TAG" dist.tar.gz \
              --title "Release $TAG" \
              --notes-file release_notes.md
          fi
